{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Department | NexusHR{% endblock %}
{% block page_title %}{% if editing %}Edit Department{% else %}New Department{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Head</label>
        <input type="text" name="head" value="{{ record.head|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Location</label>
        <input type="text" name="location" value="{{ record.location|default:'' }}">
      </div>
      <div class="form-group">
        <label>Budget</label>
        <input type="number" step="0.01" name="budget" value="{{ record.budget|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Employee Count</label>
        <input type="number" name="employee_count" value="{{ record.employee_count|default:'0' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description">{{ record.description|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Department</button>
      <a href="/departments/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
